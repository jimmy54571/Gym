<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Calendar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.92);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.12);
      --me: #3b82f6;
      --gf: #ec4899;
      --accent: #facc15;
      --day-bg: rgba(255, 255, 255, 0.04);
      --day-hover: rgba(255, 255, 255, 0.1);
      --shadow: 0 0 18px rgba(250, 204, 21, 0.15);
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.16), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    html.modal-open,
    body.modal-open {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body.modal-open {
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
    }

    .title-box {
      text-align: center;
      margin-bottom: 24px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid var(--accent);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .title-box h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--accent);
    }

    .title-box p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .section {
      flex: 1;
      background: var(--panel);
      border: 2px solid var(--accent);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .name-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: bold;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.me {
      background: var(--me);
      box-shadow: 0 0 10px var(--me);
    }

    .dot.gf {
      background: var(--gf);
      box-shadow: 0 0 10px var(--gf);
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-label {
      min-width: 110px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      color: var(--text);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .nav-btn {
      background: var(--accent);
      color: #111827;
      font-weight: bold;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 0;
    }

    .day {
      min-height: 98px;
      background: var(--day-bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .day:hover {
      background: var(--day-hover);
      transform: translateY(-1px);
    }

    .day.empty {
      cursor: default;
      opacity: 0.2;
    }

    .day.empty:hover {
      transform: none;
      background: var(--day-bg);
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .day-number {
      font-size: 14px;
      font-weight: bold;
    }

    .record-mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .record-mark.me {
      background: var(--me);
      box-shadow: 0 0 8px var(--me);
    }

    .record-mark.gf {
      background: var(--gf);
      box-shadow: 0 0 8px var(--gf);
    }

    .day-preview {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .hint-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .gamify-box {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid var(--line);
      display: grid;
      gap: 6px;
      font-size: 13px;
    }

    .gamify-title {
      font-size: 14px;
      font-weight: bold;
      color: var(--accent);
    }

    .plan-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .plan-row input {
      padding: 8px 10px;
      font-size: 13px;
    }

    .plan-btn,
    .lock-btn,
    .clear-btn {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: bold;
    }

    .plan-btn {
      background: #0ea5e9;
      color: #f8fafc;
    }

    .lock-btn {
      background: #16a34a;
      color: #f8fafc;
    }

    .clear-btn {
      background: #475569;
      color: #f8fafc;
    }

    .plan-pill {
      font-size: 12px;
      color: #cbd5e1;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 10px;
      display: inline-block;
      width: fit-content;
    }

    .preview-box {
      border: 1px dashed rgba(148, 163, 184, 0.55);
      background: rgba(15, 23, 42, 0.65);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .board-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e2e8f0;
    }

    .board-list {
      display: grid;
      gap: 8px;
      max-height: 170px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding-right: 4px;
    }

    .board-item {
      background: rgba(15, 23, 42, 0.74);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      display: grid;
      gap: 5px;
    }

    .board-text {
      color: #f1f5f9;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .board-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 11px;
    }

    .board-delete-btn {
      padding: 4px 8px;
      font-size: 11px;
      background: #475569;
      color: #f8fafc;
    }

    .board-input-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 8px;
    }

    .board-btn {
      background: #0ea5e9;
      color: white;
      font-weight: bold;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      z-index: 999;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(760px, calc(100vw - 24px));
      background: #111827;
      border: 2px solid var(--accent);
      border-radius: 18px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.45);
      padding: 20px;
      margin-top: 8px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 16px;
      color: var(--accent);
      font-size: 22px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      background: #1e293b;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .entry-notepad {
      min-height: 140px;
      line-height: 1.6;
      background: rgba(15, 23, 42, 0.52);
    }

    .entry-display {
      cursor: default;
    }

    .entry-data-hidden {
      display: none;
    }

    .entry-table {
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.52);
      min-height: 140px;
      align-content: start;
    }

    .entry-table-row {
      display: grid;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .exercise-table-row {
      grid-template-columns: minmax(0, 2fr) 80px 80px 80px auto;
    }

    .protein-table-row {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr) 90px auto;
    }

    .entry-table-head {
      color: var(--accent);
      font-weight: bold;
      padding-bottom: 6px;
      border-bottom: 1px dashed var(--line);
    }

    .entry-table-cell {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f8fafc;
    }

    .entry-delete-btn {
      padding: 6px 8px;
      font-size: 12px;
      background: #475569;
      color: #f8fafc;
      border-radius: 8px;
    }

    .entry-table-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 10px 4px;
      text-align: center;
    }

    .exercise-builder {
      display: grid;
      gap: 10px;
    }

    .entry-list {
      display: grid;
      gap: 8px;
    }

    .entry-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid var(--line);
    }

    .entry-composer {
      background: rgba(30, 41, 59, 0.82);
      border-style: dashed;
    }

    .entry-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .entry-card-title {
      font-size: 15px;
      font-weight: bold;
      color: #f8fafc;
      word-break: break-word;
    }

    .entry-card-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .entry-card-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .entry-empty {
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      background: rgba(15, 23, 42, 0.45);
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .composer-grid input,
    .protein-composer-grid input {
      min-width: 0;
    }

    .form-row-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .protein-section {
      margin-top: 2px;
    }

    .protein-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .protein-composer-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .protein-other-section {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .protein-other-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .add-protein-btn,
    .remove-protein-btn,
    .edit-protein-btn {
      background: #334155;
      color: #f8fafc;
      font-weight: bold;
      padding: 10px 12px;
    }

    .add-protein-btn {
      justify-self: flex-start;
      background: #0ea5e9;
    }

    .protein-total {
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--accent);
      font-weight: bold;
      background: rgba(15, 23, 42, 0.55);
      min-height: 42px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .add-ex-btn,
    .remove-ex-btn,
    .edit-ex-btn {
      background: #334155;
      color: #f8fafc;
      font-weight: bold;
      padding: 10px 12px;
    }

    .add-ex-btn {
      justify-self: flex-start;
      background: #2563eb;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .save-btn {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      font-weight: bold;
    }

    .cancel-btn {
      background: #475569;
      color: white;
    }

    .save-btn:hover,
    .delete-btn:hover,
    .cancel-btn:hover {
      filter: brightness(1.08);
    }

    @media (max-width: 980px) {
      .container {
        flex-direction: column;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .exercise-row {
        grid-template-columns: 1fr;
      }

      .composer-grid {
        grid-template-columns: 1fr;
      }

      .protein-grid {
        grid-template-columns: 1fr;
      }

      .protein-composer-grid {
        grid-template-columns: 1fr;
      }

      .protein-other-row {
        grid-template-columns: 1fr;
      }

      .board-input-row {
        grid-template-columns: 1fr;
      }

      .plan-row {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 86px;
      }

      .modal-backdrop {
        padding: 10px;
      }

      .modal {
        width: 100%;
        max-height: calc(100vh - 20px);
        padding: 14px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
        border-radius: 14px;
      }

      .modal h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }

      .modal-actions {
        position: sticky;
        bottom: 0;
        margin: 12px -14px calc(-14px - env(safe-area-inset-bottom, 0px));
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
        background: linear-gradient(to top, rgba(17, 24, 39, 1), rgba(17, 24, 39, 0.9));
        border-top: 1px solid var(--line);
      }

      .save-btn,
      .delete-btn,
      .cancel-btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title-box">
      <h1>健身紀錄日曆</h1>
      <p>Jimmy 和 Celine 的單頁健身網站｜點日期可新增或修改訓練紀錄｜<span id="syncStatus">同步：本機模式</span></p>
    </div>

    <div class="container">
      <div class="section">
        <div class="section-header">
          <div class="name-tag">
            <span class="dot me"></span>
            <span>Jimmy</span>
          </div>
          <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <div id="monthLabelMe" class="month-label"></div>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
          </div>
        </div>

        <div id="gamifyMe" class="gamify-box"></div>

        <div class="weekdays" id="weekdaysMe"></div>
        <div class="calendar-grid" id="calendarMe"></div>

        <div class="hint-box">
          <div class="board-title">Jimmy 留言板</div>
          <div id="boardListMe" class="board-list"></div>
          <div class="board-input-row">
            <select id="boardAuthorMe">
              <option value="Jimmy">Jimmy</option>
              <option value="Celine">Celine</option>
            </select>
            <input id="boardInputMe" type="text" maxlength="80" placeholder="給 Jimmy 的一句話..." />
            <button class="board-btn" onclick="addBoardMessage('me')">送出</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="name-tag">
            <span class="dot gf"></span>
            <span>Celine</span>
          </div>
          <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <div id="monthLabelGf" class="month-label"></div>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
          </div>
        </div>

        <div id="gamifyGf" class="gamify-box"></div>

        <div class="weekdays" id="weekdaysGf"></div>
        <div class="calendar-grid" id="calendarGf"></div>

        <div class="hint-box">
          <div class="board-title">Celine 留言板</div>
          <div id="boardListGf" class="board-list"></div>
          <div class="board-input-row">
            <select id="boardAuthorGf">
              <option value="Jimmy">Jimmy</option>
              <option value="Celine" selected>Celine</option>
            </select>
            <input id="boardInputGf" type="text" maxlength="80" placeholder="給 Celine 的一句話..." />
            <button class="board-btn" onclick="addBoardMessage('girlfriend')">送出</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h2 id="modalTitle">訓練紀錄</h2>

      <div class="form-group">
        <label>訓練項目（可自訂名稱）</label>
        <div class="exercise-builder">
          <div id="exerciseDisplay" class="entry-table entry-display"></div>
          <textarea id="exerciseText" class="entry-notepad entry-data-hidden" readonly></textarea>
          <div class="composer-grid">
            <input id="exerciseNameInput" list="exerciseOptionsList" placeholder="輸入或選擇訓練項目" />
            <datalist id="exerciseOptionsList"></datalist>
            <input id="exerciseLoadInput" type="number" min="0" step="0.5" placeholder="重量(kg)" />
            <input id="exerciseSetsInput" type="number" min="1" step="1" placeholder="組數" />
            <input id="exerciseRepsInput" type="number" min="1" step="1" placeholder="次數" />
            <button type="button" class="add-ex-btn" onclick="addExerciseRow()">+ 新增訓練項目</button>
          </div>
        </div>
      </div>

      <div class="form-group protein-section">
        <label>蛋白質攝取量 (g)</label>
        <div class="protein-grid">
          <div id="proteinDisplay" class="entry-table entry-display"></div>
          <textarea id="proteinText" class="entry-notepad entry-data-hidden" readonly></textarea>
          <div class="protein-composer-grid">
            <input id="proteinMealInput" list="proteinMealOptionsList" placeholder="輸入或選擇項目" />
            <datalist id="proteinMealOptionsList"></datalist>
            <input id="proteinFoodInput" type="text" placeholder="食物" />
            <input id="proteinAmountInput" type="number" min="0" step="0.5" placeholder="g數" />
            <button type="button" class="add-protein-btn" onclick="addProteinEntryRow()">+ 新增蛋白質項目</button>
          </div>
          <div id="proteinTotalDisplay" class="protein-total">總計：-</div>
        </div>
      </div>

      <div class="form-group">
        <label>InBody</label>
        <div class="form-row">
          <input id="inbodyWeight" type="number" min="0" step="0.1" placeholder="體重(kg)" />
          <input id="inbodyBodyFat" type="number" min="0" step="0.1" placeholder="體脂(%)" />
          <input id="inbodyMuscle" type="number" min="0" step="0.1" placeholder="骨骼肌量(kg)" />
          <input id="inbodyBmr" type="number" min="0" step="1" placeholder="基礎代謝(kcal)" />
        </div>
      </div>

      <div class="form-group">
        <label for="note">備註</label>
        <textarea id="note" placeholder="今天狀態、飲食、感受..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="delete-btn" onclick="deleteRecord()">刪除</button>
        <button class="cancel-btn" onclick="closeModal()">取消</button>
        <button class="save-btn" onclick="saveRecord()">儲存</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const weekLabels = ["日", "一", "二", "三", "四", "五", "六"];
    const STORAGE_KEY = "fitness-calendar-records-v1";
    const FIREBASE_COLLECTION = "fitnessCalendar";

    function normalizeBoardItems(items) {
      if (!Array.isArray(items)) {
        return [];
      }

      return items
        .map(item => {
          if (typeof item === "string") {
            return {
              text: item,
              time: new Date().toISOString(),
            };
          }

          if (!item || typeof item !== "object") {
            return null;
          }

          return {
            text: String(item.text || "").trim(),
            author: String(item.author || "匿名").trim() || "匿名",
            time: item.time || new Date().toISOString(),
          };
        })
        .filter(item => item && item.text)
        .slice(-BOARD_LIMIT);
    }

    function normalizeRecordsRoot(data) {
      if (!data || typeof data !== "object") {
        return createEmptyRootRecords();
      }

      const messageBoardRaw = data.messageBoard && typeof data.messageBoard === "object" ? data.messageBoard : {};
      return {
        me: data.me && typeof data.me === "object" ? data.me : {},
        girlfriend: data.girlfriend && typeof data.girlfriend === "object" ? data.girlfriend : {},
        messageBoard: {
          me: normalizeBoardItems(messageBoardRaw.me),
          girlfriend: normalizeBoardItems(messageBoardRaw.girlfriend),
        },
      };
    }

    async function initFirebaseSync() {
      if (!hasCloudConfig()) {
        updateSyncStatus("同步：本機模式（請填 Firebase 設定）");
        return;
      }

      try {
        const app = initializeApp(FIREBASE_CONFIG);
        db = getFirestore(app);
        cloudDocRef = doc(db, FIREBASE_COLLECTION, FIREBASE_DOC_ID);
        isCloudEnabled = true;
        updateSyncStatus("同步：連線中...");
      } catch (error) {
        updateSyncStatus("同步：Firebase 初始化失敗");
      }
    }

    async function loadCloudRecords() {
      if (!isCloudEnabled || !cloudDocRef) {
        return null;
      }

      try {
        const snapshot = await getDoc(cloudDocRef);
        if (!snapshot.exists()) {
          isCloudLoaded = true;
          updateSyncStatus("同步：雲端已連線（首次資料）");
          return createEmptyRootRecords();
        }

        const data = normalizeRecordsRoot(snapshot.data());
        isCloudLoaded = true;
        updateSyncStatus("同步：雲端已連線");
        return data;
      } catch (error) {
        updateSyncStatus("同步：讀取雲端失敗，使用本機");
        return null;
      }
    }

    async function syncToCloud() {
      if (!isCloudEnabled || !cloudDocRef || !isCloudLoaded) {
        return;
      }

      try {
        await setDoc(cloudDocRef, sanitizeRecordsForSave());
        updateSyncStatus("同步：已更新到雲端");
      } catch (error) {
        updateSyncStatus("同步：寫入雲端失敗（已保留本機）");
      }
    }

    function persistRecords() {
      cleanupWorkoutRecords();
      persistLocalRecords();
      syncToCloud();

    function createEmptyInbodyMetrics() {

    function normalizeInbodyMetrics(metrics) {
      return {
        weight: normalizeTextValue(metrics?.weight).trim(),
        bodyFat: normalizeTextValue(metrics?.bodyFat).trim(),
        muscle: normalizeTextValue(metrics?.muscle).trim(),
        bmr: normalizeTextValue(metrics?.bmr).trim(),
      };
    }

    function parseInbodyMetricsFromText(text) {
      const raw = normalizeTextValue(text).trim();
      if (!raw) {
        return createEmptyInbodyMetrics();
      }

      const weightMatch = raw.match(/體重\s*([0-9]+(?:\.[0-9]+)?)/i);
      const bodyFatMatch = raw.match(/體脂\s*([0-9]+(?:\.[0-9]+)?)/i);
      const muscleMatch = raw.match(/骨骼肌(?:量)?\s*([0-9]+(?:\.[0-9]+)?)/i);
      const bmrMatch = raw.match(/基礎代謝\s*([0-9]+(?:\.[0-9]+)?)/i);

      return {
        weight: weightMatch?.[1] || "",
        bodyFat: bodyFatMatch?.[1] || "",
        muscle: muscleMatch?.[1] || "",
        bmr: bmrMatch?.[1] || "",
      };
    }

    function formatInbodyMetricsText(metrics) {
      const normalized = normalizeInbodyMetrics(metrics);
      const parts = [
        normalized.weight ? `體重 ${normalized.weight}kg` : "",
        normalized.bodyFat ? `體脂 ${normalized.bodyFat}%` : "",
        normalized.muscle ? `骨骼肌 ${normalized.muscle}kg` : "",
        normalized.bmr ? `基礎代謝 ${normalized.bmr}kcal` : "",
      ].filter(Boolean);

      return parts.join(" / ");
    }

    function normalizeTextValue(value) {
      if (value === null || value === undefined) {
        return "";
      }

      const text = String(value);
      const normalized = text.trim().toLowerCase();
      if (normalized === "undefined" || normalized === "null") {
        return "";
      }

      return text;
    }

    function normalizeEntry(entry) {
      if (!entry) {
        return {
          exercises: [createEmptyExercise()],
          inbody: "",
          proteinEntries: [createEmptyProteinEntry()],
          protein: "",
          note: "",
        };
      }

      const hasExercises = Array.isArray(entry.exercises);
      const exercises = hasExercises
        ? entry.exercises.map(item => ({
            name: normalizeTextValue(item?.name),
            load: normalizeTextValue(item?.load),
            reps: normalizeTextValue(item?.reps),
            sets: normalizeTextValue(item?.sets),
          }))
        : [{
            name: normalizeTextValue(entry.training),
            load: "",
            reps: "",
            sets: normalizeTextValue(entry.sets),
          }];

      const legacyProtein = normalizeTextValue(entry.protein).trim();
      const proteinEntries = normalizeProteinEntries(entry, legacyProtein);
      const legacyWeight = normalizeTextValue(entry.weight).trim();
      const legacyBodyFat = normalizeTextValue(entry.bodyFat).trim();
      const legacyInbody = normalizeTextValue(entry.inbody).trim();
      const fallbackInbody = legacyInbody || [
        legacyWeight ? `體重 ${legacyWeight}kg` : "",
        legacyBodyFat ? `體脂 ${legacyBodyFat}%` : "",
      ].filter(Boolean).join(" / ");

      const inbodyMetricsFromData = normalizeInbodyMetrics(entry.inbodyMetrics);
      const hasStructuredInbody = Object.values(inbodyMetricsFromData).some(Boolean);
      const parsedLegacyMetrics = parseInbodyMetricsFromText(fallbackInbody);
      const inbodyMetrics = hasStructuredInbody ? inbodyMetricsFromData : parsedLegacyMetrics;

      return {
        exercises: exercises.length ? exercises : [createEmptyExercise()],
        inbody: formatInbodyMetricsText(inbodyMetrics) || fallbackInbody,
        inbodyMetrics,
        proteinEntries,
        protein: getProteinTotalTextFromEntries(proteinEntries, legacyProtein),
        note: normalizeTextValue(entry.note),
      };
    }

    function normalizeProteinEntries(entry, legacyProtein = "") {
      const entries = [];

      const addEntry = (meal, food, amount) => {
        const normalizedMeal = normalizeTextValue(meal).trim();
        const normalizedFood = normalizeTextValue(food).trim();
        const normalizedAmount = normalizeTextValue(amount).trim();
        if (!normalizedMeal && !normalizedFood && !normalizedAmount) {
          return;
        }

        entries.push({
          meal: normalizedMeal,
          food: normalizedFood,
          amount: normalizedAmount,
        });
      };

      if (Array.isArray(entry.proteinEntries)) {
        entry.proteinEntries.forEach(item => addEntry(item?.meal, item?.food, item?.amount));
      }

      const rawMeals = entry.proteinMeals;
      if (rawMeals && typeof rawMeals === "object") {
        // 兼容新舊 proteinMeals 結構
        const breakfast = rawMeals.breakfast;
        const lunch = rawMeals.lunch;
        const dinner = rawMeals.dinner;

        if (breakfast && typeof breakfast === "object") {
          addEntry("早餐", breakfast.name, breakfast.amount);
        } else {
          addEntry("早餐", "", breakfast);
        }

        if (lunch && typeof lunch === "object") {
          addEntry("午餐", lunch.name, lunch.amount);
        } else {
          addEntry("午餐", "", lunch);
        }

        if (dinner && typeof dinner === "object") {
          addEntry("晚餐", dinner.name, dinner.amount);
        } else {
          addEntry("晚餐", "", dinner);
        }

        if (Array.isArray(rawMeals.others)) {
          rawMeals.others.forEach(item => addEntry(item?.name || "其他", "", item?.amount));
        }

        const legacySnack = normalizeTextValue(rawMeals.snack).trim();
        if (legacySnack) {
          addEntry("點心", "", legacySnack);
        }
      }

      const fallbackLegacy = normalizeTextValue(legacyProtein).trim();
      if (!entries.length && fallbackLegacy) {
        addEntry("其他", "", fallbackLegacy);
      }

      return entries.length ? entries : [createEmptyProteinEntry()];
    }

    function toProteinNumber(value) {
      const text = normalizeTextValue(value).trim();
      if (!text) return null;

      const number = Number(text);
      if (!Number.isFinite(number) || number < 0) {
        return null;
      }

      return number;
    }

    function formatProteinNumber(value) {
      const rounded = Math.round(value * 10) / 10;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded);
    }

    function getProteinEntriesTotal(entries) {
      return (entries || []).reduce((sum, item) => {
        const num = toProteinNumber(item?.amount);
        return sum + (num === null ? 0 : num);
      }, 0);
    }

    function getProteinTotalTextFromEntries(entries, legacyProtein = "") {
      const total = getProteinEntriesTotal(entries);
      if (total > 0) {
        return formatProteinNumber(total);
      }

      return normalizeTextValue(legacyProtein).trim();
    }

    function getPreviewTraining(entry) {
      const normalized = normalizeEntry(entry);
      const valid = normalized.exercises.filter(item => item.name);

      if (!valid.length) {
        return "";
      }

      const first = valid[0];
      const firstLine = `${first.name}${first.load ? ` ${first.load}kg` : ""}${first.sets ? ` ${first.sets}組` : ""}${first.reps ? ` x ${first.reps}下` : ""}`;
      const suffix = valid.length > 1 ? ` +${valid.length - 1}` : "";
      return (firstLine + suffix).slice(0, 24);
    }

    function formatMessageTime(isoTime) {
      const date = new Date(isoTime);
      if (Number.isNaN(date.getTime())) {

      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${min}`;

    function renderCalendarForPerson(personKey, containerId, styleKey) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

      for (let i = 0; i < totalCells; i++) {
        const dayNumber = i - firstDay + 1;
        const cell = document.createElement("div");

        if (dayNumber < 1 || dayNumber > daysInMonth) {
          cell.className = "day empty";
          container.appendChild(cell);
          continue;
        }

        const dateKey = formatDateKey(currentYear, currentMonth, dayNumber);
        const entry = records[personKey][dateKey];
        const normalizedEntry = normalizeEntry(entry);

        cell.className = "day";
        cell.onclick = () => openModal(personKey, dateKey);

        const previewTraining = entry ? getPreviewTraining(entry) : "";
        const previewInbody = normalizedEntry.inbody ? "InBody" : "";
        const previewProtein = normalizedEntry.protein ? `蛋白 ${normalizedEntry.protein} g` : "";

        cell.innerHTML = `
          <div class="day-top">
            <div class="day-number">${dayNumber}</div>
            ${entry ? `<div class="record-mark ${styleKey}"></div>` : ""}
          </div>
          <div class="day-preview">
            ${previewTraining ? `<div>${escapeHtml(previewTraining)}</div>` : ""}
            ${previewInbody ? `<div>${escapeHtml(previewInbody)}</div>` : ""}
            ${previewProtein ? `<div>${escapeHtml(previewProtein)}</div>` : ""}
          </div>
        `;

        container.appendChild(cell);
      }
    }

    function buildExerciseSuggestionsHtml() {
      return getSortedExerciseOptions()
        .map(item => `<option value="${escapeHtml(item)}"></option>`)
        .join("");
    }

    function getSortedExerciseOptions() {
      const usageMap = new Map();
      const addUsage = (name) => {
        const normalizedName = normalizeTextValue(name).trim();
        if (!normalizedName) return;
        usageMap.set(normalizedName, (usageMap.get(normalizedName) || 0) + 1);
      };

      ["me", "girlfriend"].forEach(personKey => {
        Object.values(records[personKey] || {}).forEach(entry => {
          const normalized = normalizeEntry(entry);
          normalized.exercises.forEach(exercise => addUsage(exercise.name));
        });
      });

      EXERCISE_OPTIONS.forEach(name => {
        if (!usageMap.has(name)) {
          usageMap.set(name, 0);
        }
      });

      return Array.from(usageMap.keys()).sort((a, b) => {
        const countDiff = (usageMap.get(b) || 0) - (usageMap.get(a) || 0);
        if (countDiff !== 0) {
          return countDiff;
        }

        const aBaseIndex = BASE_EXERCISE_ORDER[a];
        const bBaseIndex = BASE_EXERCISE_ORDER[b];
        const aInBase = aBaseIndex !== undefined;
        const bInBase = bBaseIndex !== undefined;

        if (aInBase && bInBase) {
          return aBaseIndex - bBaseIndex;
        }

        if (aInBase) return -1;
        if (bInBase) return 1;
        return a.localeCompare(b, "zh-Hant");
      });
    }

    function formatExerciseLine(exercise) {
      const parts = [normalizeTextValue(exercise?.name).trim()];
      const load = normalizeTextValue(exercise?.load).trim();
      const sets = normalizeTextValue(exercise?.sets).trim();
      const reps = normalizeTextValue(exercise?.reps).trim();

      if (load) parts.push(`${load}kg`);
      if (sets || reps) {
        parts.push(`${sets || "-"}組${reps ? ` x ${reps}下` : ""}`);
      }

      return parts.filter(Boolean).join(" ").trim();
    }

      });
    }

    function renderProteinMealInputOptions() {
      const optionList = document.getElementById("proteinMealOptionsList");
      if (!optionList) return;

      const options = getSortedProteinMealOptions();
      optionList.innerHTML = options.map(item => `<option value="${escapeHtml(item)}"></option>`).join("");
    }

    function ensureOptionExists(optionList, value) {
      if (!value) return;
      if (!optionList.includes(value)) {
        optionList.push(value);
      }
    }

    function parseExercisesText(text) {
      return String(text || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const loadMatch = line.match(/(\d+(?:\.\d+)?)\s*kg/i);
          const setsMatch = line.match(/(\d+)\s*組/);
          const repsMatch = line.match(/(?:x|X|×|\*)\s*(\d+)\s*下?/i);

          const name = line
            .replace(/(\d+(?:\.\d+)?)\s*kg/ig, "")
            .replace(/(\d+)\s*組/g, "")
            .replace(/(?:x|X|×|\*)\s*(\d+)\s*下?/ig, "")
            .replace(/[|,，]+/g, " ")
            .replace(/\s+/g, " ")
            .trim() || line;

          return {
            name,
            load: loadMatch?.[1] || "",
            reps: repsMatch?.[1] || "",
            sets: setsMatch?.[1] || "",
          };
        });
    }

    function collectExercisesFromForm() {
      return parseExercisesText(document.getElementById("exerciseText")?.value || "");
    }

    function renderExerciseRows(exercises) {
      const text = (exercises || [])
        .map(formatExerciseLine)
        .filter(Boolean)
        .join("\n");

      document.getElementById("exerciseText").value = text;
      renderExerciseDisplay(exercises || []);
    }

    function renderExerciseDisplay(exercises) {
      const container = document.getElementById("exerciseDisplay");
      if (!container) return;

      const rows = (exercises || [])
        .map((item, index) => ({ item, index }))
        .filter(row => row.item.name || row.item.load || row.item.sets || row.item.reps);
      if (!rows.length) {
        container.innerHTML = `<div class="entry-table-empty">按下方按鈕新增訓練項目</div>`;
        return;
      }

      const body = rows
        .map(row => `
          <div class="entry-table-row exercise-table-row">
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.name).trim())}</div>
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.load).trim()) || "-"}</div>
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.sets).trim()) || "-"}</div>
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.reps).trim()) || "-"}</div>
            <button type="button" class="entry-delete-btn" onclick="removeExerciseAt(${row.index})">刪除</button>
          </div>
        `)
        .join("");

      container.innerHTML = `
        <div class="entry-table-row exercise-table-row entry-table-head">
          <div>項目</div>
          <div>kg</div>
          <div>組數</div>
          <div>次數</div>
          <div></div>
        </div>
        ${body}
      `;
    }

    function formatProteinEntryLine(item) {
      const meal = normalizeTextValue(item?.meal).trim();
      const food = normalizeTextValue(item?.food).trim();
      const amount = normalizeTextValue(item?.amount).trim();
      return [meal, food, amount ? `${amount}g` : ""].filter(Boolean).join(" ").trim();
    }

    function parseProteinEntriesText(text) {
      return String(text || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const amountMatch = line.match(/(\d+(?:\.\d+)?)\s*g/i);
          const amount = amountMatch?.[1] || "";
          const withoutAmount = amountMatch ? line.replace(amountMatch[0], "").trim() : line;
          const parts = withoutAmount.split(/\s+/).filter(Boolean);

          if (parts.length >= 2) {
            return {
              meal: parts[0],
              food: parts.slice(1).join(" "),
              amount,
            };
          }

          return {
            meal: "",
            food: withoutAmount,
            amount,
          };
        });
    }

    function collectProteinEntriesFromForm() {
      return parseProteinEntriesText(document.getElementById("proteinText")?.value || "");
    }

    function renderProteinEntryRows(entries) {
      const text = (entries || [])
        .map(formatProteinEntryLine)
        .filter(Boolean)
        .join("\n");

      document.getElementById("proteinText").value = text;
      renderProteinDisplay(entries || []);
    }

    function renderProteinDisplay(entries) {
      const container = document.getElementById("proteinDisplay");
      if (!container) return;

      const rows = (entries || [])
        .map((item, index) => ({ item, index }))
        .filter(row => row.item.meal || row.item.food || row.item.amount);
      if (!rows.length) {
        container.innerHTML = `<div class="entry-table-empty">按下方按鈕新增蛋白質項目</div>`;
        return;
      }

      const body = rows
        .map(row => `
          <div class="entry-table-row protein-table-row">
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.meal).trim()) || "-"}</div>
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.food).trim()) || "-"}</div>
            <div class="entry-table-cell">${escapeHtml(normalizeTextValue(row.item.amount).trim()) || "-"}</div>
            <button type="button" class="entry-delete-btn" onclick="removeProteinAt(${row.index})">刪除</button>
          </div>
        `)
        .join("");

      container.innerHTML = `
        <div class="entry-table-row protein-table-row entry-table-head">
          <div>項目</div>
          <div>食物</div>
          <div>g數</div>
          <div></div>
        </div>
        ${body}
      `;
    }

    function updateProteinTotalDisplay() {
      const totalEl = document.getElementById("proteinTotalDisplay");
      if (!totalEl) return;

      const entries = collectProteinEntriesFromForm();
      const totalText = getProteinTotalTextFromEntries(entries);
      totalEl.textContent = totalText ? `總計：${totalText} g` : "總計：-";
    }

    function appendLineToTextarea(textareaId, line) {
      const textarea = document.getElementById(textareaId);
      if (!textarea) return;

      const current = textarea.value.trim();
      textarea.value = current ? `${current}\n${line}` : line;

      if (textareaId === "exerciseText") {
        renderExerciseDisplay(collectExercisesFromForm());
      } else if (textareaId === "proteinText") {
        renderProteinDisplay(collectProteinEntriesFromForm());
      }
    }

    function addExerciseRow() {
      const name = normalizeTextValue(document.getElementById("exerciseNameInput")?.value).trim();
      if (name) {
        ensureOptionExists(EXERCISE_OPTIONS, name);
        renderExerciseInputOptions();
      }

      if (!name) return;

      const load = normalizeTextValue(document.getElementById("exerciseLoadInput")?.value).trim();
      const sets = normalizeTextValue(document.getElementById("exerciseSetsInput")?.value).trim();
      const reps = normalizeTextValue(document.getElementById("exerciseRepsInput")?.value).trim();

      const line = formatExerciseLine({ name, load, sets, reps });
      if (!line) return;

      appendLineToTextarea("exerciseText", line);

      document.getElementById("exerciseNameInput").value = "";
      document.getElementById("exerciseLoadInput").value = "";
      document.getElementById("exerciseSetsInput").value = "";
      document.getElementById("exerciseRepsInput").value = "";
    }
    function editExerciseRow() {}
    function removeExerciseRow() {
      const rows = collectExercisesFromForm();
      if (!rows.length) return;

      rows.pop();
      renderExerciseRows(rows);
    }
    function removeExerciseAt(index) {
      const rows = collectExercisesFromForm();
      if (index < 0 || index >= rows.length) return;

      rows.splice(index, 1);
      renderExerciseRows(rows);
    }
    function addProteinEntryRow() {
      const meal = normalizeTextValue(document.getElementById("proteinMealInput")?.value).trim();
      if (meal) {
        ensureOptionExists(PROTEIN_MEAL_OPTIONS, meal);
        renderProteinMealInputOptions();
      }

      const food = normalizeTextValue(document.getElementById("proteinFoodInput")?.value).trim();
      const amount = normalizeTextValue(document.getElementById("proteinAmountInput")?.value).trim();

      const line = formatProteinEntryLine({ meal, food, amount });
      if (!line) return;

      appendLineToTextarea("proteinText", line);

      document.getElementById("proteinMealInput").value = "";
      document.getElementById("proteinFoodInput").value = "";
      document.getElementById("proteinAmountInput").value = "";
      updateProteinTotalDisplay();
    }
    function editProteinEntryRow() {}
    function removeProteinEntryRow() {
      const rows = collectProteinEntriesFromForm();
      if (!rows.length) return;

      rows.pop();
      renderProteinEntryRows(rows);
      updateProteinTotalDisplay();
    }
    function removeProteinAt(index) {
      const rows = collectProteinEntriesFromForm();
      if (index < 0 || index >= rows.length) return;

      rows.splice(index, 1);
      renderProteinEntryRows(rows);
      updateProteinTotalDisplay();
    }

    function openModal(person, dateKey) {
      currentEditing.person = person;
      currentEditing.dateKey = dateKey;

      const personLabel = person === "me" ? "Jimmy" : "Celine";
      document.getElementById("modalTitle").textContent = `${personLabel}｜${dateKey}｜訓練紀錄`;

      renderExerciseInputOptions();
      renderProteinMealInputOptions();
      const entry = normalizeEntry(records[person][dateKey]);
      renderExerciseRows(entry.exercises);
      document.getElementById("inbodyWeight").value = entry.inbodyMetrics?.weight || "";
      document.getElementById("inbodyBodyFat").value = entry.inbodyMetrics?.bodyFat || "";
      document.getElementById("inbodyMuscle").value = entry.inbodyMetrics?.muscle || "";
      document.getElementById("inbodyBmr").value = entry.inbodyMetrics?.bmr || "";
      renderProteinEntryRows(entry.proteinEntries);
      updateProteinTotalDisplay();
      document.getElementById("note").value = entry.note;

      lockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.documentElement.classList.add("modal-open");
      document.body.classList.add("modal-open");
      document.body.style.top = `-${lockedScrollY}px`;
      document.getElementById("modalBackdrop").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("show");
      document.documentElement.classList.remove("modal-open");
      document.body.classList.remove("modal-open");
      document.body.style.top = "";
      window.scrollTo(0, lockedScrollY);
      currentEditing.person = null;
      currentEditing.dateKey = null;
    }

    function saveRecord() {
      const { person, dateKey } = currentEditing;
      if (!person || !dateKey) return;

      const proteinEntries = collectProteinEntriesFromForm();
      const inbodyMetrics = normalizeInbodyMetrics({
        weight: document.getElementById("inbodyWeight")?.value,
        bodyFat: document.getElementById("inbodyBodyFat")?.value,
        muscle: document.getElementById("inbodyMuscle")?.value,
        bmr: document.getElementById("inbodyBmr")?.value,
      });

      records[person][dateKey] = {
        exercises: collectExercisesFromForm(),
        inbodyMetrics,
        inbody: formatInbodyMetricsText(inbodyMetrics),
        proteinEntries,
        protein: getProteinTotalTextFromEntries(proteinEntries),
        note: document.getElementById("note").value.trim(),
      };

      if (!hasAnyEntryData(records[person][dateKey])) {
        delete records[person][dateKey];
      }

      persistRecords();
      renderCalendars();
      closeModal();
    }

    function deleteRecord() {
      const { person, dateKey } = currentEditing;
      if (!person || !dateKey) return;

      if (records[person][dateKey]) {
        delete records[person][dateKey];
        persistRecords();
      }

      renderCalendars();
      closeModal();
    }

    function changeMonth(diff) {
      currentMonth += diff;

      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }

      renderCalendars();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("modalBackdrop").addEventListener("click", function (e) {
      if (e.target === this) {
        closeModal();
      }
    });

    document.getElementById("modalBackdrop").addEventListener("touchmove", function (e) {
      if (e.target === this) {
        e.preventDefault();
      }
    }, { passive: false });

    async function bootstrap() {
      renderWeekdays();
      renderCalendars();

      await initFirebaseSync();
      const cloudData = await loadCloudRecords();

      if (!cloudData) {
        return;
      }

      if (hasAnyData(cloudData)) {
        records = cloudData;
        persistLocalRecords();
        renderCalendars();
        return;
      }

      if (hasAnyData(records)) {
        await syncToCloud();
      }
    }

    bootstrap();

    // 把需要被 HTML onclick 呼叫的函式掛到 window（module scope 限制）
    window.changeMonth = changeMonth;
    window.addExerciseRow = addExerciseRow;
    window.removeExerciseRow = removeExerciseRow;
    window.deleteRecord = deleteRecord;
    window.closeModal = closeModal;
    window.saveRecord = saveRecord;
    window.addBoardMessage = addBoardMessage;
    window.removeBoardMessage = removeBoardMessage;
    window.updateProteinTotalDisplay = updateProteinTotalDisplay;
    window.addProteinEntryRow = addProteinEntryRow;
    window.removeProteinEntryRow = removeProteinEntryRow;
    window.removeExerciseAt = removeExerciseAt;
    window.removeProteinAt = removeProteinAt;
  </script>
</body>
</html>
